name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-driver-tests:
    name: Build driver tests
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build driver test app
        run: |
          . /opt/esp/idf/export.sh
          cd test_apps/drivers
          idf.py build

  unit-tests:
    name: Run unit tests (Linux host)
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run unit tests
        run: |
          . /opt/esp/idf/export.sh
          cd test_apps/unity
          idf.py --preview set-target linux
          idf.py build
          ./build/unity_tests.elf